name: wegagen_remit
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0' # Updated to be compatible with your environment

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  shared_preferences: ^2.5.3
  provider: ^6.1.2
  intl: ^0.20.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^1.2.1
  image_picker: ^1.1.2
  camera: ^0.11.0
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  country_picker: ^2.0.27
  dio: ^5.9.2
  flutter_riverpod: ^2.6.1
  webview_flutter: ^4.10.0 # Uncommented and updated for compatibility
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  
dependency_overrides:
  web: 0.5.1
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/onboard/
    - assets/payment/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android: true
  ios: true
  android_12:
    image: assets/images/logo.png
    color: "#FFFFFF"