name: wegagen_remit
description: "Wegagen Remit - Send Money Worldwide"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0" # Compatible with Dart 3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^0.13.6
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  intl: ^0.18.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.2
  smooth_page_indicator: ^1.1.0
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  country_picker: ^2.0.20
  flutter_riverpod: ^2.4.7
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  # Missing dependencies for functionality
  image_picker: ^1.0.4
  camera: ^0.10.5+5
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.12.1
  webview_flutter_wkwebview: ^3.9.4
  dio: ^5.3.2
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  http_parser: ^4.0.2
  # Device information packages
  device_info_plus: ^9.1.0
  package_info_plus: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.3.3
  freezed: ^2.4.6
  json_serializable: ^6.7.1

dependency_overrides:
  # Only keep essential overrides that don't conflict with mobile builds
  shared_preferences_web: 2.2.2
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/onboard/
    - assets/payment/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android: true
  ios: true
  web: true
  android_12:
    image: assets/images/logo.png
    color:  "#FFFFFF" # Wegagen orange (primary)
    icon_background_color:  "#FFFFFF"
